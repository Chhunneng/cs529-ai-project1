refine_answer_task:
  description: |
    You MUST use MCP tools to evaluate the answer.

    Steps:
    1. Call extract_keywords on the IDEAL ANSWER
    2. Call keyword_alignment using extracted keywords and USER ANSWER
    3. Call answer_rubric_score using QUESTION, IDEAL ANSWER, USER ANSWER

    Use the tool outputs to generate your response.

    INTERVIEW QUESTION:
    {question}

    IDEAL ANSWER:
    {ideal_answer}

    USER ANSWER:
    {user_answer}

    Produce:
    - feedback: based on missing keywords and rubric
    - refined_answer: improved version
    - scores: MUST align with rubric score (scale 0-10)

    Return ONLY valid JSON:
    {
      "feedback": "- ...\n- ...",
      "refined_answer": "...",
      "scores": {"overall": 0, "clarity": 0, "relevance": 0, "confidence": 0}
    }
  expected_output: >
    A JSON object with feedback, refined_answer, and scores.
  agent: answer_coach