services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_agent}
      POSTGRES_USER: ${POSTGRES_USER:-resume_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      # Ensure container-to-container URLs
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://resume_agent:resume_agent@postgres:5432/resume_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      RESUME_UPLOADS_DIR: ${RESUME_UPLOADS_DIR:-/data/resume-uploads}
      INTERNAL_COMPILE_TOKEN: ${INTERNAL_COMPILE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/artifacts:/data/artifacts
      - ./data/resume-uploads:/data/resume-uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()\""]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker.runner"]
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://resume_agent:resume_agent@postgres:5432/resume_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      LATEX_SERVICE_URL: ${LATEX_SERVICE_URL:-http://backend:8000/api/v1/internal}
      INTERNAL_COMPILE_TOKEN: ${INTERNAL_COMPILE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./data/artifacts:/data/artifacts

  crewai-interview-worker:
    build:
      context: ./crewai-interview
    command: ["python", "-m", "app.crewai_queue_consumer"]
    env_file:
      - ./.env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QUEUE_KEY: ${QUEUE_KEY:-queue:agent-jobs}
      CREWAI_REQUEST_QUEUE_KEY: ${CREWAI_REQUEST_QUEUE_KEY:-queue:crewai-interview-requests}
      CREWAI_PROCESSING_LIST_KEY: ${CREWAI_PROCESSING_LIST_KEY:-queue:crewai-interview-processing}
      CREWAI_DEAD_LETTER_LIST_KEY: ${CREWAI_DEAD_LETTER_LIST_KEY:-queue:crewai-interview-dead-letter}
      CREWAI_MAX_ATTEMPTS: ${CREWAI_MAX_ATTEMPTS:-3}
      CREWAI_REQUEUE_PROCESSING_ON_START: ${CREWAI_REQUEUE_PROCESSING_ON_START:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CREWAI_LLM_MODEL: ${CREWAI_LLM_MODEL:-openai/gpt-4o-mini}
      MCP_INTERVIEW_TOOLS_URL: ${MCP_INTERVIEW_TOOLS_URL:-http://mcp-interview-tools:8080/mcp}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CREWAI_TRACING_ENABLED: ${CREWAI_TRACING_ENABLED:-true}
    depends_on:
      redis:
        condition: service_healthy
      mcp-interview-tools:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,redis; redis.Redis.from_url(os.environ['REDIS_URL'], decode_responses=True).ping()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./crewai_tokens:/root/.config/crewai/

  mcp-interview-tools:
    build:
      context: ./mcp/interview-tools
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
