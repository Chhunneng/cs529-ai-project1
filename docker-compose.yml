services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resume_agent}
      POSTGRES_USER: ${POSTGRES_USER:-resume_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resume_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      # Ensure container-to-container URLs
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://resume_agent:resume_agent@postgres:5432/resume_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      RESUME_UPLOADS_DIR: ${RESUME_UPLOADS_DIR:-/data/resume-uploads}
      INTERNAL_COMPILE_TOKEN: ${INTERNAL_COMPILE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/artifacts:/data/artifacts
      - ./data/resume-uploads:/data/resume-uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()\""]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker.runner"]
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://resume_agent:resume_agent@postgres:5432/resume_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ARTIFACTS_DIR: ${ARTIFACTS_DIR:-/data/artifacts}
      LATEX_SERVICE_URL: ${LATEX_SERVICE_URL:-http://backend:8000/api/v1/internal}
      INTERNAL_COMPILE_TOKEN: ${INTERNAL_COMPILE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./data/artifacts:/data/artifacts

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
